<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horsebit - Live Demo Access</title>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Rajdhani:wght@300;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #050b18;
  --azure-blue: #3b82f6;
  --horsebit-orange: #f97316;
  --cyan-glow: #06b6d4;
  --text-dim: rgba(255, 255, 255, 0.5);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg-deep);
  width: 100vw; height: 100vh;
  overflow: hidden;
  font-family: 'JetBrains Mono', monospace;
  color: #fff;
}

/* ── ATMÓSFERA CLOUD ── */
#atmosphere {
  position: fixed; inset: 0;
  background: 
    radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 70%),
    radial-gradient(circle at 100% 0%, rgba(6, 182, 212, 0.05) 0%, transparent 40%),
    radial-gradient(circle at 0% 100%, rgba(249, 115, 22, 0.03) 0%, transparent 40%);
  z-index: 1;
}

/* ── LAYOUT 16:9 ── */
#root {
  position: relative;
  width: min(100vw, 177.78vh);
  height: min(100vh, 56.25vw);
  margin: auto;
  top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 10;
}

/* ── TOP: BADGES ── */
.status-bar {
  position: absolute; top: 6vh;
  display: flex; gap: 2vw;
}

.badge {
  font-size: 0.65vw;
  font-weight: 700;
  letter-spacing: 0.15em;
  padding: 0.6vh 1.2vw;
  border-radius: 3px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.1);
  display: flex; align-items: center; gap: 0.6vw;
  text-transform: uppercase;
  color: var(--text-dim);
}

.badge .dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--cyan-glow);
  box-shadow: 0 0 10px var(--cyan-glow);
}

.badge.ready .dot { background: #22c55e; box-shadow: 0 0 10px #22c55e; }

/* ── CENTER: TITULAR Y QR ── */
.main-stage {
  text-align: center;
  display: flex; flex-direction: column;
  align-items: center;
  gap: 5vh;
}

.title-group {
  margin-bottom: 1vh;
}

.title-top {
  font-family: 'Rajdhani', sans-serif;
  font-size: 3.5vw;
  font-weight: 300;
  letter-spacing: 0.1em;
  color: #fff;
  text-transform: uppercase;
}

.title-top b { 
  color: var(--horsebit-orange); 
  font-weight: 700;
}

.title-bottom {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.3vw;
  font-weight: 600;
  letter-spacing: 0.6em;
  color: var(--cyan-glow);
  text-transform: uppercase;
  text-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
  margin-top: -0.2vh;
}

/* ── QR HUD ── */
.qr-container {
  position: relative;
  padding: 1.5vw;
}

.hud-corner {
  position: absolute;
  width: 2vw; height: 2vw;
  border: 1px solid rgba(59, 130, 246, 0.4);
}
.tl { top: 0; left: 0; border-right: none; border-bottom: none; }
.tr { top: 0; right: 0; border-left: none; border-bottom: none; }
.bl { bottom: 0; left: 0; border-right: none; border-top: none; }
.br { bottom: 0; right: 0; border-left: none; border-top: none; }

.qr-box {
  position: relative;
  width: 19vw;
  aspect-ratio: 1/1;
  background: #fff;
  border-radius: 4px;
  padding: 1.2vw;
  box-shadow: 0 25px 100px rgba(0, 0, 0, 0.8);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}

/* Imagen del QR */
.qr-box img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  position: relative;
  z-index: 2;
}

/* Efecto Holográfico de Scan */
.scan-bar {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 6vh;
  background: linear-gradient(to bottom, 
    transparent, 
    rgba(6, 182, 212, 0.2), 
    var(--cyan-glow), 
    transparent);
  z-index: 5;
  filter: blur(1px);
  animation: scanLoop 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}

/* ── ANIMACIONES ── */
@keyframes scanLoop {
  0% { transform: translateY(-6vh); opacity: 0; }
  15% { opacity: 1; }
  85% { opacity: 1; }
  100% { transform: translateY(22vw); opacity: 0; }
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.particle {
  position: absolute;
  font-size: 0.5vw;
  color: var(--azure-blue);
  opacity: 0.12;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="atmosphere"></div>

<div id="root">
  
  <div class="status-bar">
    <div class="badge"><span class="dot"></span> Azure Connected</div>
    <div class="badge"><span class="dot"></span> HTTPS Secure</div>
    <div class="badge ready"><span class="dot"></span> Production Ready</div>
  </div>

  <div class="main-stage">
    <div class="title-group">
      <h1 class="title-top">EXPLORA LA <b>DEMO</b></h1>
      <div class="title-bottom">EN TIEMPO REAL</div>
    </div>

    <div class="qr-container">
      <div class="hud-corner tl"></div>
      <div class="hud-corner tr"></div>
      <div class="hud-corner bl"></div>
      <div class="hud-corner br"></div>
      
      <div class="qr-box">
        <div class="scan-bar"></div>
        <!-- PON AQUÍ TU IMAGEN -->
        <img src="QR.jpeg" alt="Horsebit QR">
      </div>
    </div>
  </div>

</div>

<script>
  // Partículas sutiles de fondo
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.innerText = Math.random() > 0.5 ? '01' : 'HB';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = Math.random() * 100 + 'vh';
    p.style.animation = `float ${6 + Math.random() * 6}s ease-in-out infinite`;
    document.body.appendChild(p);
  }
</script>

</body>
</html>
